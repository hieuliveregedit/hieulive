<script>
    // Hàm tạo số ngẫu nhiên cho các chỉ số phụ (đổi liên tục sau mỗi lần bấm)
    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // Thuật toán siêu lọc chuỗi và băm cố định chỉ số Nhìn Xung Quanh từ 150 đến 190
    function getFixedGeneral(rawName) {
        // Lọc sạch: Chuyển viết hoa, xóa khoảng trắng đầu cuối, thay thế chuỗi khoảng trắng ở giữa thành 1 dấu cách duy nhất
        var cleanName = rawName.toUpperCase().trim().replace(/\s+/g, ' ');
        
        // Thuật toán băm chuỗi nội dung ký tự
        var hash = 0;
        for (var i = 0; i < cleanName.length; i++) {
            hash = cleanName.charCodeAt(i) + ((hash << 5) - hash);
        }
        
        // Ép kết quả hash chạy chuẩn xác trong dải từ 150 đến 190
        var finalValue = 150 + Math.abs(hash) % 41; 
        return finalValue;
    }

    // MÀN HÌNH 1: Xác thực mã kích hoạt hệ thống
    function verifyKey() {
        var inputField = document.getElementById('activationKey');
        if (!inputField) return;
        
        var userKey = inputField.value.trim().toLowerCase();
        
        if (userKey.indexOf("phamhieu") === 0) {
            var numberPart = userKey.substring(8);
            var keyNum = parseInt(numberPart, 10);
            
            if (!isNaN(keyNum) && keyNum >= 1 && keyNum <= 100 && "phamhieu" + keyNum === userKey) {
                document.getElementById('keySection').style.display = 'none';
                document.getElementById('searchSection').style.display = 'block';
                return;
            }
        }
        alert("❌ Mã khóa không chính xác!\nVui lòng nhập lại mã khóa mới.");
    }

    // Hàm chọn nhanh tên thiết bị từ phần gợi ý
    function selectDevice(name) {
        document.getElementById('deviceInput').value = name;
    }

    // MÀN HÌNH 2: Xử lý tra cứu độ nhạy
    function getSensitivity() {
        var deviceInput = document.getElementById('deviceInput');
        if (!deviceInput) return;

        var rawDeviceValue = deviceInput.value;

        if (rawDeviceValue.trim() === "") {
            alert("❌ Vui lòng nhập tên dòng máy iPhone của bạn!");
            return;
        }

        // --- PHẦN 1: KHÓA CHẾT "NHÌN XUNG QUANH" THEO TÊN MÁY BẰNG BỘ LỌC CHUỖI NÂNG CAO ---
        var finalGeneral = getFixedGeneral(rawDeviceValue);

        // --- PHẦN 2: TỰ ĐỘNG ĐỔI NGẪU NHIÊN CÁC CHỈ SỐ CÒN LẠI SAU MỖI LẦN BẤM ---
        var randomRedDot = getRandomInt(140, 185);
        var randomScope2x = getRandomInt(135, 175);
        var randomScope4x = getRandomInt(130, 165);
        var randomScopeAwm = getRandomInt(80, 110);
        var randomLook = getRandomInt(110, 145);
        var randomBtnSize = getRandomInt(41, 49) + "%";

        // --- ĐỔ DỮ LIỆU LÊN GIAO DIỆN MÀN HÌNH KẾT QUẢ ---
        document.getElementById('resModel').innerText = rawDeviceValue.trim();
        document.getElementById('valGeneral').innerText = finalGeneral; // Luôn cố định theo chuỗi cốt lõi
        document.getElementById('valRedDot').innerText = randomRedDot;  // Đổi ngẫu nhiên liên tục
        document.getElementById('val2x').innerText = randomScope2x;     // Đổi ngẫu nhiên liên tục
        document.getElementById('val4x').innerText = randomScope4x;     // Đổi ngẫu nhiên liên tục
        document.getElementById('valAwm').innerText = randomScopeAwm;   // Đổi ngẫu nhiên liên tục
        document.getElementById('valLook').innerText = randomLook;     // Đổi ngẫu nhiên liên tục
        document.getElementById('valButton').innerText = randomBtnSize; // Đổi ngẫu nhiên liên tục

        // Chuyển sang màn hình hiển thị kết quả DPI
        document.getElementById('searchSection').style.display = 'none';
        document.getElementById('resultSection').style.display = 'block';
    }

    // MÀN HÌNH 3: Nút quay lại để tra cứu máy khác
    function backToSearch() {
        document.getElementById('resultSection').style.display = 'none';
        document.getElementById('searchSection').style.display = 'block';
    }

    // Hàm thông báo khi người dùng nhấn nút cài đặt file cấu hình VIP
    function showGuide() {
        alert("📥 Hệ thống đang tải xuống tệp cấu hình VIP!\nSau khi tải xong, hãy vào ứng dụng 'Cài đặt' trên iPhone để kích hoạt cấu hình Regedit.");
    }
</script>
