<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP DPI PRO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div id="loginBox" class="card big">
<h1>🔐 NHẬP KEY</h1>
<input id="keyInput">
<button onclick="checkKey()">VÀO</button>
</div>

<div id="deviceBox" class="card big" style="display:none;">
<h1>📱 TÊN MÁY</h1>
<input id="deviceInput">
<button onclick="saveDevice()">TIẾP</button>
</div>

<div id="mainApp" style="display:none;">

<h1 class="title">🔥 DPI VIP</h1>

<div class="card">
<div>Nhìn: <b id="look"></b></div>
<div>Red: <b id="red"></b></div>
<div>2x: <b id="scope2"></b></div>
<div>4x: <b id="scope4"></b></div>
<div>AWM: <b id="awm"></b></div>
<div>Free: <b id="free"></b></div>
<div>Nút bắn: <b id="fire"></b></div>
</div>

<div class="card">
<button onclick="downloadConfig()">CÀI CONFIG</button>
</div>

<div class="card">
<button onclick="newDevice()">NHẬP MÁY KHÁC</button>
</div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
