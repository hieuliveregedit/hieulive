<!DOCTYPE html>
<html>
<head>
    <title>HIẾU LIVE VIP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .box { border: 2px solid #f00; border-radius: 20px; padding: 25px; background: #111; max-width: 350px; margin: auto; box-shadow: 0 0 15px #f00; }
        img { border-radius: 50%; border: 2px solid #f00; margin-bottom: 10px; }
        h2 { color: #f00; text-transform: uppercase; margin-bottom: 20px; }
        input { padding: 14px; width: 85%; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; font-size: 16px; margin-bottom: 15px; outline: none; }
        input:focus { border-color: #f00; }
        button { padding: 14px; background: #f00; color: #fff; border: none; border-radius: 10px; font-weight: bold; width: 93%; cursor: pointer; text-transform: uppercase; }
        .hidden { display: none; }
        .result { margin-top: 25px; border-top: 1px solid #333; padding-top: 20px; text-align: left; line-height: 2; }
        span { color: #f00; font-weight: bold; float: right; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://imgur.com" width="90">
        <h2>HIẾU LIVE VIP</h2>

        <!-- MÀN HÌNH KHÓA (ĐÃ XÓA HẾT GỢI Ý) -->
        <div id="keyScreen">
            <input type="password" id="inputKey" placeholder="Nhập mã kích hoạt...">
            <button onclick="checkKey()">Kích hoạt ngay</button>
            <!-- Không còn dòng chữ gợi ý ở đây -->
        </div>

        <!-- MÀN HÌNH CHÍNH -->
        <div id="mainApp" class="hidden">
            <input type="text" id="phoneName" placeholder="Nhập tên máy lấy độ nhạy...">
            <button onclick="getSens()">Lấy thông số</button>

            <div id="resultBox" class="result" style="display: none;">
                <p>Máy: <span id="resDevice"></span></p>
                <p>Nhìn xung quanh: <span>100</span></p>
                <p>Red Dot: <span>98</span></p>
                <p>DPI: <span id="resDPI"></span></p>
            </div>
        </div>
    </div>

    <script>
        // MẬT KHẨU CŨ CỦA BẠN (Viết liền không dấu)
        const SECRET_KEY = "phamhieu99";

        function checkKey() {
            let userKey = document.getElementById("inputKey").value;
            // Chuyển về chữ thường để tránh lỗi viết hoa đầu dòng
            if(userKey.toLowerCase() === SECRET_KEY) {
                document.getElementById("keyScreen").classList.add("hidden");
                document.getElementById("mainApp").classList.remove("hidden");
            } else {
                alert("Mã kích hoạt không đúng!");
            }
        }

        function getSens() {
            let name = document.getElementById("phoneName").value;
            if(!name) return alert("Chưa nhập tên máy!");
            document.getElementById("resDevice").innerText = name.toUpperCase();
            document.getElementById("resDPI").innerText = "585";
            document.getElementById("resultBox").style.display = "block";
        }
    </script>
</body>
</html>
