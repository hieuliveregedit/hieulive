<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Regedit VIP Free Fire</title>
    <style>
        :root { --primary: #ff4a4a; --bg: #0d0f12; --card-bg: #1a1d24; --text: #ffffff; --text-dim: #a0a5b5; --accent: #28a745; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .container { width: 100%; max-width: 450px; background: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); box-sizing: border-box; }
        h2 { text-align: center; color: var(--primary); margin-top: 0; margin-bottom: 25px; text-transform: uppercase; font-size: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; color: var(--text-dim); font-size: 14px; }
        input[type="text"] { width: 100%; padding: 14px; border: 2px solid #2e3440; background: #252932; color: white; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .app-section { display: none; }
        .active-section { display: block !important; }
        .info-box { background: #252932; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .info-title { font-weight: bold; color: var(--primary); margin-bottom: 10px; text-transform: uppercase; font-size: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-item { background: #1e222b; padding: 10px; border-radius: 8px; font-size: 14px; }
        .stat-item span { display: block; color: var(--text-dim); font-size: 11px; margin-bottom: 4px; }
        .stat-value { font-weight: bold; font-size: 16px; }
        .btn-install { background: var(--accent); display: block; text-align: center; text-decoration: none; color: white; padding: 14px; border-radius: 10px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>DPI REGEDIT IPHONE VIP</h2>
    
    <!-- MÀN HÌNH 1: NHẬP KEY -->
    <div class="app-section active-section" id="keySection">
        <div class="form-group">
            <label>🔑 Nhập Mã Kích Hoạt (Key VIP):</label>
            <input type="text" id="activationKey" placeholder="Ví dụ: VIP999">
            <button onclick="verifyKey()">XÁC THỰC KEY HỆ THỐNG VIP</button>
        </div>
    </div>

    <!-- MÀN HÌNH 2: NHẬP TÊN MÁY -->
    <div class="app-section" id="searchSection">
        <div class="form-group">
            <label>📱 Nhập Tên Dòng Máy iPhone Để Lấy Độ Nhạy:</label>
            <input type="text" id="deviceInput" placeholder="Ví dụ: iPhone 11, iPhone 13...">
            <button onclick="getSensitivity()">TRA CỨU ĐỘ NHẠY & CẤU HÌNH</button>
        </div>
    </div>

    <!-- MÀN HÌNH 3: HIỂN THỊ ĐỘ NHẠY & TẢI PROFILE -->
    <div class="app-section" id="resultSection">
        <div class="info-box">
            <div class="info-title">Thông Tin Thiết Bị VIP</div>
            <div class="grid-2">
                <div class="stat-item"><span>Dòng Máy Kích Hoạt</span><div class="stat-value" id="resModel" style="color: #ffc107;">-</div></div>
                <div class="stat-item"><span>Hệ Thống Profile</span><div class="stat-value" style="color: #28a745;">Sẵn Sàng Nạp</div></div>
            </div>
        </div>

        <div class="info-box">
            <div class="info-title">🎯 Độ Nhạy Kéo Tâm VIP</div>
            <div class="grid-2">
                <div class="stat-item"><span>Nhìn Xung Quanh</span><div class="stat-value">100</div></div>
                <div class="stat-item"><span>Red Dot Sight</span><div class="stat-value">95</div></div>
                <div class="stat-item"><span>Ống Ngắm 2x</span><div class="stat-value">92</div></div>
                <div class="stat-item"><span>Ống Ngắm 4x</span><div class="stat-value">88</div></div>
                <div class="stat-item"><span>Ống Ngắm Súng Ngắm</span><div class="stat-value">50</div></div>
                <div class="stat-item"><span>Nhìn</span><div class="stat-value">65</div></div>
            </div>
            <div class="stat-item" style="margin-top: 10px; background: #1e222b;">
                <span>Kích Thước Nút Bắn Chuẩn</span>
                <div class="stat-value" style="color: #ffc107;">45%</div>
            </div>
        </div>

        <!-- Sử dụng thẻ liên kết trực tiếp để iOS không chặn tải về -->
        <a href="vip.mobileconfig" class="btn-install" onclick="showGuide()">CÀI ĐẶT VIP.MOBILECONFIG VÀO MÁY</a>
    </div>
</div>

<script>
    const VALID_KEY = "VIP999"; 

    function verifyKey() {
        if (document.getElementById('activationKey').value.trim() === VALID_KEY) {
            switchSection('keySection', 'searchSection');
        } else {
            alert("❌ Mã Key VIP không chính xác!");
        }
    }

    function getSensitivity() {
        const inputVal = document.getElementById('deviceInput').value.trim();
        if (inputVal === "") { alert("Vui lòng nhập tên dòng máy!"); return; }
        document.getElementById('resModel').innerText = inputVal.toUpperCase();
        switchSection('searchSection', 'resultSection');
    }

    function showGuide() {
        alert("Đang tải tệp cấu hình...\n\nHướng dẫn kích hoạt:\n1. Vào 'Cài đặt' trên iPhone.\n2. Chọn mục 'Đã tải về hồ sơ' xuất hiện ngay dưới iCloud.\n3. Bấm 'Cài đặt' ở góc trên cùng bên phải.");
    }

    function switchSection(hideId, showId) {
        document.getElementById(hideId).classList.remove('active-section');
        document.getElementById(showId).classList.add('active-section');
    }
</script>
</body>
</html>
