<script>
    // Hàm tạo số ngẫu nhiên cho các chỉ số phụ
    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // BẢNG DỮ LIỆU ĐỘ NHẠY CỐ ĐỊNH 100% CHO CÁC DÒNG IPHONE
    var iphoneDatabase = {
        "IPHONE 7": 155, "IPHONE 8": 158, "IPHONE X": 162, "IPHONE XS": 165, "IPHONE XR": 165,
        "IPHONE 11": 168, "IPHONE 12": 172, "IPHONE 13": 178, "IPHONE 14": 182, "IPHONE 15": 188,
        "DEFAULT": 170
    };

    function getAbsoluteGeneral(rawName) {
        var cleanName = rawName.toUpperCase().trim();
        if (cleanName.indexOf("15") !== -1) return iphoneDatabase["IPHONE 15"];
        if (cleanName.indexOf("14") !== -1) return iphoneDatabase["IPHONE 14"];
        if (cleanName.indexOf("13") !== -1) return iphoneDatabase["IPHONE 13"];
        if (cleanName.indexOf("12") !== -1) return iphoneDatabase["IPHONE 12"];
        if (cleanName.indexOf("11") !== -1) return iphoneDatabase["IPHONE 11"];
        if (cleanName.indexOf("XS") !== -1) return iphoneDatabase["IPHONE XS"];
        if (cleanName.indexOf("XR") !== -1) return iphoneDatabase["IPHONE XR"];
        if (cleanName.indexOf("X") !== -1) return iphoneDatabase["IPHONE X"];
        if (cleanName.indexOf("8") !== -1) return iphoneDatabase["IPHONE 8"];
        if (cleanName.indexOf("7") !== -1) return iphoneDatabase["IPHONE 7"];
        return iphoneDatabase["DEFAULT"];
    }

    // SỬA LỖI ĐỒNG BỘ ID Ô NHẬP KEY KHÔNG BỊ TRƠ NÚT
    function verifyKey() {
        var inputField = document.getElementById('activationKey'); // Khớp hoàn toàn với ID ở trên
        if (!inputField) {
            alert("Lỗi hệ thống: Không tìm thấy ô nhập Key!");
            return;
        }
        
        var userKey = inputField.value.trim().toLowerCase();
        
        // Kiểm tra đúng định dạng phamhieu + số (1-100)
        if (userKey.indexOf("phamhieu") === 0) {
            var numberPart = userKey.substring(8);
            var keyNum = parseInt(numberPart, 10);
            if (!isNaN(keyNum) && keyNum >= 1 && keyNum <= 100 && "phamhieu" + keyNum === userKey) {
                // Lệnh chuyển màn hình chính xác
                document.getElementById('keySection').style.display = 'none';
                document.getElementById('searchSection').style.display = 'block';
                return;
            }
        }
        
        // Nếu gõ sai key thì bắt buộc phải nảy thông báo này
        alert("❌ Mã khóa không chính xác!\nVui lòng nhập lại mã khóa mới.");
    }

    function selectDevice(name) {
        document.getElementById('deviceInput').value = name;
    }

    function getSensitivity() {
        var deviceInput = document.getElementById('deviceInput');
        if (!deviceInput) return;
        var rawDeviceValue = deviceInput.value;

        if (rawDeviceValue.trim() === "") {
            alert("❌ Vui lòng nhập tên dòng máy iPhone của bạn!");
            return;
        }

        var finalGeneral = getAbsoluteGeneral(rawDeviceValue);
        var randomRedDot = getRandomInt(140, 185);
        var randomScope2x = getRandomInt(135, 175);
        var randomScope4x = getRandomInt(130, 165);
        var randomScopeAwm = getRandomInt(80, 110);
        var randomLook = getRandomInt(110, 145);
        var randomBtnSize = getRandomInt(41, 49) + "%";

        document.getElementById('resModel').innerText = rawDeviceValue.trim();
        document.getElementById('valGeneral').innerText = finalGeneral;
        document.getElementById('valRedDot').innerText = randomRedDot;
        document.getElementById('val2x').innerText = randomScope2x;
        document.getElementById('val4x').innerText = randomScope4x;
        document.getElementById('valAwm').innerText = randomScopeAwm;
        document.getElementById('valLook').innerText = randomLook;
        document.getElementById('valButton').innerText = randomBtnSize;

        // Cập nhật thanh đồ họa phát sáng
        if(document.getElementById('barGeneral')) document.getElementById('barGeneral').style.width = (finalGeneral / 2) + "%";
        if(document.getElementById('barRedDot')) document.getElementById('barRedDot').style.width = (randomRedDot / 2) + "%";
        if(document.getElementById('bar2x')) document.getElementById('bar2x').style.width = (randomScope2x / 2) + "%";
        if(document.getElementById('bar4x')) document.getElementById('bar4x').style.width = (randomScope4x / 2) + "%";

        document.getElementById('searchSection').style.display = 'none';
        document.getElementById('resultSection').style.display = 'block';
    }

    function backToSearch() {
        document.getElementById('resultSection').style.display = 'none';
        document.getElementById('searchSection').style.display = 'block';
    }

    function showGuide() {
        alert("📥 Hệ thống đang tải xuống tệp cấu hình VIP!\nSau khi tải xong, hãy vào ứng dụng 'Cài đặt' trên iPhone để kích hoạt cấu hình Regedit.");
    }
</script>
