<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIẾU LIVE VIP - ĐỘ NHẠY</title>
    <style>
        :root { --primary: #00ff00; --bg: #050505; }
        body { font-family: monospace; background: var(--bg); color: var(--primary); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 380px; padding: 25px; border: 1px solid var(--primary); text-align: center; background: #111; border-radius: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--primary); color: var(--primary); text-align: center; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #main-ui, #result { display: none; }
        .stat-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(0,255,0,0.2); }
        .val { color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <!-- MÀN HÌNH KHÓA -->
    <div id="login-screen">
        <h2 style="color: #fff">ACCESS DENIED</h2>
        <input type="password" id="passInput" placeholder="NHẬP KEY BẢO MẬT">
        <button onclick="checkPass()">XÁC MINH</button>
    </div>

    <!-- MÀN HÌNH CHÍNH -->
    <div id="main-ui">
        <h3>HỆ THỐNG PHÂN TÍCH</h3>
        <input type="text" id="phoneModel" placeholder="NHẬP TÊN MÁY (VD: IPHONE 11)">
        <button onclick="getSens()">LẤY ĐỘ NHẠY</button>
    </div>

    <!-- MÀN HÌNH KẾT QUẢ -->
    <div id="result">
        <h4 style="color: #fff">KẾT QUẢ CHO: <span id="resName"></span></h4>
        <div class="stat-box" style="text-align: left;">
            <div class="stat-row"><span>XUNG QUANH:</span> <span class="val" id="v1"></span></div>
            <div class="stat-row"><span>RED DOT:</span> <span class="val" id="v2"></span></div>
            <div class="stat-row"><span>ỐNG NGẮM 2X:</span> <span class="val" id="v3"></span></div>
            <div class="stat-row"><span>NÚT BẮN:</span> <span class="val" id="v4"></span></div>
        </div>
        <p style="font-size: 11px; color: yellow; margin-top: 15px;">* Cần cài Profile để kích hoạt 0.1ms</p>
        <a href="vip.mobileconfig" style="color: #ff0000; font-weight: bold; text-decoration: none; border: 1px solid #ff0000; padding: 10px; display: block;">KÍCH HOẠT PROFILE</a>
    </div>
</div>

<script>
    function checkPass() {
        if (document.getElementById('passInput').value === "PHAMHIEU99") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
        } else { alert("Sai mật khẩu!"); }
    }

    function getSens() {
        const phone = document.getElementById('phoneModel').value;
        if (!phone) return alert("Chưa nhập tên máy!");
        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('resName').innerText = phone.toUpperCase();
        
        // Thuật toán trả số
        document.getElementById('v1').innerText = Math.floor(Math.random() * 5) + 95;
        document.getElementById('v2').innerText = Math.floor(Math.random() * 5) + 90;
        document.getElementById('v3').innerText = Math.floor(Math.random() * 10) + 85;
        document.getElementById('v4').innerText = "48%";
    }
</script>

</body>
</html>
